<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能学习助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        h1 i { color: #4f46e5; }
        .btn {
            padding: 12px 24px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .btn:hover { background: #4338ca; transform: translateY(-2px); }
        .btn-secondary { background: #334155; }
        .btn-secondary:hover { background: #475569; }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .upload-zone {
            border: 2px dashed #334155;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #4f46e5;
            background: rgba(79, 70, 229, 0.1);
        }
        .upload-zone i { font-size: 48px; color: #4f46e5; margin-bottom: 16px; }
        .upload-zone h3 { margin-bottom: 8px; }
        .upload-zone p { color: #94a3b8; }
        .formats { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
        .format-badge {
            padding: 4px 12px;
            background: rgba(79, 70, 229, 0.2);
            border: 1px solid #4f46e5;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #4f46e5;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 12px 24px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }
        .tab-btn:hover { border-color: #4f46e5; color: #f1f5f9; }
        .tab-btn.active { background: #4f46e5; border-color: #4f46e5; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .hidden { display: none !important; }
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #4f46e5; }
        .button-group { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        #message { margin-top: 16px; padding: 16px; background: #0f172a; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-brain"></i> AI智能学习助手</h1>
            <button class="btn btn-secondary" id="settings-btn">
                <i class="fas fa-cog"></i> 设置
            </button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="learn">
                <i class="fas fa-book-open"></i> 学习
            </button>
            <button class="tab-btn" data-tab="questions">
                <i class="fas fa-pencil-alt"></i> 题目分析
            </button>
            <button class="tab-btn" data-tab="interactive">
                <i class="fas fa-gamepad"></i> 交互学习
            </button>
        </div>

        <div id="learn-tab" class="tab-content active">
            <div class="card">
                <div class="upload-zone" id="upload-zone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>拖拽文件到此处</h3>
                    <p>或点击选择文件上传</p>
                    <div class="formats">
                        <span class="format-badge">PDF</span>
                        <span class="format-badge">PPTX</span>
                    </div>
                    <input type="file" id="file-input" accept=".pdf,.pptx" hidden>
                </div>
                <div id="message" class="hidden"></div>
            </div>
        </div>

        <div id="questions-tab" class="tab-content">
            <div class="card">
                <h3 style="margin-bottom: 16px;"><i class="fas fa-pencil-alt"></i> 题目分析</h3>
                <textarea id="question-input" placeholder="输入题目内容..."></textarea>
                <div class="button-group">
                    <button class="btn" id="analyze-btn">
                        <i class="fas fa-magic"></i> AI分析
                    </button>
                </div>
                <div id="analysis-result" style="margin-top: 16px;"></div>
            </div>
        </div>

        <div id="interactive-tab" class="tab-content">
            <div class="card">
                <h3 style="margin-bottom: 16px;"><i class="fas fa-gamepad"></i> 交互学习</h3>
                <div class="button-group">
                    <button class="btn" onclick="alert('驾照测验功能开发中...')">
                        <i class="fas fa-car"></i> 驾照测验
                    </button>
                    <button class="btn btn-secondary" onclick="alert('数学练习功能开发中...')">
                        <i class="fas fa-calculator"></i> 数学练习
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('Script starting...');

        // Test variables
        let currentTab = 'learn';
        let currentFile = null;

        // DOM Elements
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const message = document.getElementById('message');
        const questionInput = document.getElementById('question-input');
        const analyzeBtn = document.getElementById('analyze-btn');
        const analysisResult = document.getElementById('analysis-result');

        console.log('Elements found:', {
            uploadZone: !!uploadZone,
            fileInput: !!fileInput,
            message: !!message,
            analyzeBtn: !!analyzeBtn
        });

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                console.log('Tab clicked:', this.dataset.tab);
                currentTab = this.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.tab + '-tab').classList.add('active');
            });
        });

        // Upload zone click
        uploadZone.addEventListener('click', function() {
            console.log('Upload zone clicked');
            fileInput.click();
        });

        // Drag and drop
        uploadZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            console.log('Drag over');
            this.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', function() {
            console.log('Drag leave');
            this.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', function(e) {
            e.preventDefault();
            console.log('Drop event:', e.dataTransfer.files);
            this.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', function(e) {
            console.log('File input changed:', e.target.files);
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        // Handle file
        function handleFile(file) {
            console.log('handleFile called:', file.name);
            currentFile = file;
            const ext = file.name.split('.').pop().toLowerCase();

            message.classList.remove('hidden');
            message.innerHTML = `
                <p><i class="fas fa-check-circle" style="color: #10b981;"></i> 文件已加载: ${file.name}</p>
                <p style="color: #94a3b8; margin-top: 8px;">类型: ${ext.toUpperCase()} | 大小: ${(file.size / 1024).toFixed(2)} KB</p>
            `;

            uploadZone.classList.add('hidden');
        }

        // Analyze button
        analyzeBtn.addEventListener('click', function() {
            console.log('Analyze button clicked');
            const text = questionInput.value.trim();

            if (!text) {
                analysisResult.innerHTML = '<p style="color: #ef4444;">请输入题目内容</p>';
                return;
            }

            analysisResult.innerHTML = `
                <div style="padding: 16px; background: #0f172a; border-radius: 8px;">
                    <p><i class="fas fa-check-circle" style="color: #10b981;"></i> 题目已提交分析</p>
                    <p style="color: #94a3b8; margin-top: 8px;">您输入的内容: ${text.substring(0, 50)}...</p>
                    <p style="color: #94a3b8; margin-top: 8px;">AI分析功能正在完善中...</p>
                </div>
            `;
        });

        console.log('Script completed successfully!');
        console.log('All event listeners attached.');
    </script>
</body>
</html>
