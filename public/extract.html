<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识收藏 - 分析中...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        h1 { font-size: 1.3rem; margin-bottom: 20px; color: #4f46e5; text-align: center; }
        .loading { text-align: center; font-size: 1.1rem; color: #818cf8; }
        .spinner { font-size: 2rem; margin-bottom: 15px; }
        .result { margin-top: 20px; }
        .result-item { background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .result-label { color: #94a3b8; font-size: 0.85rem; margin-bottom: 5px; }
        .result-value { color: #f1f5f9; line-height: 1.5; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; margin-right: 8px; font-size: 0.85rem; }
        .badge.study { background: rgba(16,185,129,0.2); color: #10b981; }
        .badge.entertainment { background: rgba(236,72,153,0.2); color: #ec4899; }
        .badge.health { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: rgba(99,102,241,0.2); color: #818cf8; padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; }
        .btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .btn:hover { transform: translateY(-2px); }
        .summary { background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 10px; line-height: 1.6; margin-top: 10px; }
        .error { color: #ef4444; text-align: center; padding: 20px; }
        .success-icon { font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📊 AI 分析结果</h1>
        <div id="loading" class="loading">
            <div class="spinner">⏳</div>
            <div id="status">正在获取内容...</div>
        </div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        async function init() {
            const pendingText = localStorage.getItem('pendingText');
            if (pendingText) {
                document.getElementById('status').textContent = '正在分析内容...';
                localStorage.removeItem('pendingText');
                await analyzeContent(pendingText, 'text');
            } else {
                showError('没有内容，请先在知识管理系统中点击"粘贴并分析"');
            }
        }

        async function analyzeContent(content, platform) {
            try {
                const response = await fetch('http://localhost:3000/api/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: content })
                });
                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                displayResult(data, content);
            } catch (e) {
                showError('分析失败: ' + e.message);
            }
        }

        function displayResult(data, originalContent) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display = 'block';

            const catClass = data.category?.category || 'study';
            const catLabel = data.category?.label || '📚 学习';
            const contentType = data.contentType?.type || data.contentType || '一般';
            const sentiment = data.sentiment?.sentiment || '中性';
            const tags = data.tags || [];

            document.getElementById('result').innerHTML = `
                <div class="result-item">
                    <div class="result-label">分类</div>
                    <div class="result-value">
                        <span class="badge ${catClass}">${catLabel}</span>
                        <span class="badge">${contentType}</span>
                        <span class="badge">${sentiment}</span>
                    </div>
                </div>

                <div class="result-item">
                    <div class="result-label">🏷️ 标签</div>
                    <div class="tags">
                        ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                </div>

                <div class="result-item">
                    <div class="result-label">📌 AI 摘要</div>
                    <div class="summary">${escapeHtml(data.summary || '无法生成摘要')}</div>
                </div>

                ${data.keyPoints && data.keyPoints.length > 0 ? `
                <div class="result-item">
                    <div class="result-label">💡 关键要点</div>
                    <div class="result-value">
                        ${data.keyPoints.map(p => `• ${p.title}: ${p.content}`).join('<br>')}
                    </div>
                </div>
                ` : ''}

                ${data.suggestions && data.suggestions.length > 0 ? `
                <div class="result-item">
                    <div class="result-label" style="color: var(--success);">🎯 行动建议</div>
                    <div class="result-value">
                        ${data.suggestions.map(s => `• ${s}`).join('<br>')}
                    </div>
                </div>
                ` : ''}

                <div class="result-item">
                    <div class="result-label">📊 内容信息</div>
                    <div class="result-value">字数: ${data.wordCount} | 预计阅读: ${data.estimatedReadTime}分钟</div>
                </div>

                <button class="btn" onclick="saveAndGo()">
                    💾 保存到知识管理系统
                </button>
            `;

            localStorage.setItem('pendingAnalysis', JSON.stringify({
                content: originalContent,
                analysis: data,
                timestamp: Date.now()
            }));
        }

        function saveAndGo() {
            window.location.href = '/?saveanalysis=1';
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerHTML = `
                <div class="success-icon">❌</div>
                <p>${msg}</p>
                <button class="btn" onclick="window.location.href='/'">返回知识管理系统</button>
            `;
        }

        init();
    </script>
</body>
</html>
